<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:sans-serif;
background:#f5f5f5;
padding:10px;
}

h1{
text-align:center;
margin-bottom:15px;
}
  
.toolbar,
.formBox{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

input,
textarea,
button{
width:100%;
padding:10px;
margin-top:8px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

textarea{
min-height:100px;
resize:vertical;
}

button{
background:#1976d2;
color:white;
border:none;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.year-title{
background:#222;
color:white;
padding:10px;
border-radius:8px;
margin-top:15px;
font-size:20px;
font-weight:bold;
}

.event{
background:white;
margin-top:10px;
padding:12px;
border-radius:10px;
box-shadow:0 1px 5px rgba(0,0,0,.1);
transition:.2s;
}

.event:hover{
transform:translateY(-2px);
}

.event-title{
font-size:18px;
font-weight:bold;
}

.date{
color:#666;
font-size:13px;
}

.detail{
display:none;
margin-top:10px;
}

.detail img{
width:100%;
max-width:500px;
border-radius:10px;
margin-bottom:10px;
}

.country-tag{
display:inline-block;
padding:4px 8px;
border-radius:999px;
font-size:12px;
font-weight:bold;
background:#eee;
margin-bottom:6px;
}

@media(max-width:768px){

body{
padding:8px;
}

h1{
font-size:28px;
}

h2{
font-size:14px;
}

  
.toolbar,
.formBox{
padding:12px;
}

.event-title{
font-size:16px;
}

.year-title{
font-size:18px;
}

}

</style>

</head>

<body>

<h1>歴史年表</h1>

<a href="https://phototourl.com/jp">画像URL化サイト</a>


<div class="toolbar">

<input
type="text"
id="searchBox"
placeholder="出来事検索"
oninput="render()">

<br><br>

<input
type="text"
id="countryFilter"
placeholder="国で検索"
oninput="render()">

<br><br>

<label>
開始年
<span id="startYearText">0</span>
</label>

<input
type="range"
id="startYear"
min="0"
max="2100"
value="0"
oninput="updateSlider()">

<label>
終了年
<span id="endYearText">2100</span>
</label>

<input
type="range"
id="endYear"
min="0"
max="2100"
value="2100"
oninput="updateSlider()">

<br><br>

<button onclick="toggleForm()">
出来事を追加
</button>

</div>

<div
id="formBox"
class="formBox"
style="display:none;">

<input
type="date"
id="eventDate">

<input
type="text"
id="eventCountry"
placeholder="国名（例：日本）">

<input
type="text"
id="eventTitle"
placeholder="出来事名">

<textarea
id="eventDescription"
placeholder="概要">
</textarea>

<input
type="text"
id="eventImage"
placeholder="画像URL">

<button onclick="saveEvent()">
保存
</button>

</div>

<div id="timeline"></div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
getDatabase,
ref,
push,
set,
onValue,
remove,
update
}
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyCuu-ZlQvYxnFM1mPFGd4e15zjOkQJMnAI",
authDomain:"nenpyo-74dd8.firebaseapp.com",
databaseURL:"https://nenpyo-74dd8-default-rtdb.firebaseio.com",
projectId:"nenpyo-74dd8",
storageBucket:"nenpyo-74dd8.firebasestorage.app",
messagingSenderId:"765631896748",
appId:"1:765631896748:web:512e8aa75146c511851309"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let events = [];
let editingId = null;

function getCountryColor(country){

let hash = 0;

for(let i=0;i<country.length;i++){

hash =
country.charCodeAt(i)
+
((hash<<5)-hash);

}

return "#" +
(
hash &
0x00FFFFFF
)
.toString(16)
.padStart(6,"0");

}

window.toggleForm = function(){

const form =
document.getElementById(
"formBox"
);

form.style.display =
form.style.display ===
"none"
?
"block"
:
"none";

}

window.updateSlider =
function(){

document.getElementById(
"startYearText"
).textContent =
document.getElementById(
"startYear"
).value;

document.getElementById(
"endYearText"
).textContent =
document.getElementById(
"endYear"
).value;

render();

}

window.saveEvent =
async function(){

const date =
eventDate.value;

const country =
eventCountry.value.trim();

const title =
eventTitle.value;

const description =
eventDescription.value;

const image =
eventImage.value;

if(!date || !title){

alert(
"日付とタイトルを入力してください"
);

return;

}
const data = {

date,
country,
title,
description,
image

};

if(editingId){

await update(
ref(
db,
"events/" +
editingId
),
data
);

editingId = null;

}else{

const newRef =
push(
ref(
db,
"events"
)
);

await set(
newRef,
data
);

}

eventDate.value="";
eventCountry.value="";
eventTitle.value="";
eventDescription.value="";
eventImage.value="";

}

window.editEvent =
function(id){

const event =
events.find(
e=>e.id===id
);

editingId = id;

eventDate.value =
event.date;

eventCountry.value =
event.country || "";

eventTitle.value =
event.title;

eventDescription.value =
event.description;

eventImage.value =
event.image || "";

document.getElementById(
"formBox"
).style.display =
"block";

}

window.deleteEvent = function(id){

const firstConfirm =
confirm(
"本当に削除しますか？"
);

if(!firstConfirm){
return;
}

const secondConfirm =
confirm(
"この操作は元に戻せません。"
);

if(!secondConfirm){
return;
}

const answer =
prompt(
"削除するには YES と入力してください"
);

if(answer !== "YES"){

alert(
"入力が違うため削除を中止しました"
);

return;

}

remove(
ref(
db,
"events/" + id
)
);

}

window.toggleDetail =
function(id){

const detail =
document.getElementById(
"detail-" + id
);

detail.style.display =
detail.style.display ===
"block"
?
"none"
:
"block";

}

window.render =
function(){

const keyword =
searchBox.value
.toLowerCase();

const countryKeyword =
countryFilter.value
.toLowerCase();

const start =
parseInt(
startYear.value
);

const end =
parseInt(
endYear.value
);

const filtered =
events.filter(event=>{

const year =
parseInt(
event.date
.split("-")[0]
);

return(

year >= start &&
year <= end

)

&&

(
countryKeyword === ""

||

(event.country || "")
.toLowerCase()
.includes(
countryKeyword
)
)

&&

(
event.title
.toLowerCase()
.includes(keyword)

||

(event.description || "")
.toLowerCase()
.includes(keyword)
);

});

timeline.innerHTML="";

const years = {};

filtered
.sort(
(a,b)=>
new Date(a.date)
-
new Date(b.date)
)
.forEach(event=>{

const year =
event.date
.split("-")[0];

if(!years[year]){

years[year]=[];

}

years[year]
.push(event);

});

Object.keys(years)
.sort()
.forEach(year=>{

const yearDiv =
document.createElement(
"div"
);

yearDiv.innerHTML =
`<div class="year-title">
${year}年
</div>`;

years[year]
.forEach(event=>{

const color =
getCountryColor(
event.country ||
"未分類"
);

const eventDiv =
document.createElement(
"div"
);

eventDiv.className =
"event";

eventDiv.style.borderLeft =
"8px solid " + color;

eventDiv.innerHTML =
`
<div onclick="toggleDetail('${event.id}')">

<div class="country-tag">
🌏 ${event.country || "未分類"}
</div>

<div class="date">
${event.date}
</div>

<div class="event-title">
${event.title}
</div>

</div>

<div
class="detail"
id="detail-${event.id}"
>

${event.image ?

`<img src="${event.image}">`

:

""

}

<p>
${event.description || ""}
</p>

<button
onclick="editEvent('${event.id}')">
編集
</button>

<button
onclick="deleteEvent('${event.id}')">
削除
</button>

</div>
`;

yearDiv.appendChild(
eventDiv
);

});

timeline.appendChild(
yearDiv
);

});

}

onValue(
ref(db,"events"),
snapshot=>{

events=[];

snapshot.forEach(
child=>{

events.push({

id:child.key,

...child.val()

});

});

render();

}
);

updateSlider();

</script>

</body>

</html>
